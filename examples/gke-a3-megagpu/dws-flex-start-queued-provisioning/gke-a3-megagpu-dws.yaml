---

blueprint_name: gke-a3-mega

terraform_backend_defaults:
  type: gcs
  configuration:
    bucket: 

vars:
  project_id:  northam-ce-mlai-tpu ## Set GCP Project ID Here ##
  deployment_name: rick-a3-mega-dws
  region: asia-northeast1
  zone: asia-northeast1-b

  # Cidr block containing the IP of the machine calling terraform.
  # The following line must be updated for this example to work.
  authorized_cidr: 0.0.0.0/0
  kueue_configuration_path: $(ghpc_stage("./dws-queues.yaml.tftpl"))
  nccl_installer_path: $(ghpc_stage("./nccl-installer.yaml"))

deployment_groups:
- group: primary
  modules:
  - id: network1
    source: modules/network/vpc
    settings:
      subnetwork_name: $(vars.deployment_name)-subnet
      mtu: 8244
      secondary_ranges_list:
      - subnetwork_name: $(vars.deployment_name)-subnet
        ranges:
        - range_name: pods
          ip_cidr_range: 10.4.0.0/14
        - range_name: services
          ip_cidr_range: 10.0.32.0/20

  - id: gke_service_account
    source: community/modules/project/service-account
    settings:
      name: gke-sa
      project_roles:
      - logging.logWriter
      - monitoring.metricWriter
      - monitoring.viewer
      - stackdriver.resourceMetadata.writer
      - storage.objectViewer
      - artifactregistry.reader

  - id: gpunets
    source: modules/network/multivpc
    settings:
      network_name_prefix: $(vars.deployment_name)-gpunet
      global_ip_address_range: 192.169.0.0/16
      network_count: 8
      subnetwork_cidr_suffix: 24

  - id: gke_cluster
    source: modules/scheduler/gke-cluster
    use: [network1, gpunets, gke_service_account]
    settings:
      enable_private_endpoint: false  # Allows for access from authorized public IPs
      master_authorized_networks:
      - cidr_block: $(vars.authorized_cidr)  # Allows your machine run kubectl command. It's required for the multi-network setup.
        display_name: "kubectl-access-network"
    outputs: [instructions]

  - id: a3_megagpu_pool
    source: modules/compute/gke-node-pool
    use: [gke_cluster, gpunets, gke_service_account]
    settings:
      machine_type: a3-megagpu-8g
      #flex start
      enable_queued_provisioning: true
      enable_flex_start: true
      autoscaling_total_min_nodes: 0
      enable_private_nodes: true
      auto_repair: false
      auto_upgrade: false
      zones: [$(vars.zone)]
      guest_accelerator:
      - type: nvidia-h100-mega-80gb
        count: 8
    outputs: [instructions]

  - id: workload_manager_install
    source: modules/management/kubectl-apply
    use: [gke_cluster]
    settings:
      kueue:
        install: true
        config_path: $(vars.kueue_configuration_path)
        config_template_vars:
          num_gpus: 1000
      jobset:
        install: true
      apply_manifests:
      - source: $(vars.nccl_installer_path)